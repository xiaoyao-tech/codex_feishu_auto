name: validate

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install shell used by the optional macOS script
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Parse bundled JSON
        run: |
          python3 -m json.tool codex-feishu-auto/assets/watch-config.example.json >/dev/null
          python3 -m json.tool codex-feishu-auto/evals/evals.json >/dev/null
      - name: Check shell syntax
        run: |
          bash -n install.sh
          zsh -n codex-feishu-auto/scripts/capture_watch.sh
